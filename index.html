<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSight</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>

body{
font-family:'DM Sans',sans-serif;
background:#faf8f4;
margin:0;
color:#1a1a1c;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-family:'DM Serif Display',serif;
font-size:28px;
}

.video-box{
margin-top:20px;
position:relative;
background:#111;
border-radius:16px;
overflow:hidden;
aspect-ratio:4/3;
}

video{
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

#faceBox{
position:absolute;
border:2px solid white;
border-radius:6px;
display:none;
}

.scan-line{
position:absolute;
left:0;
right:0;
height:2px;
background:linear-gradient(90deg,transparent,#fff,transparent);
animation:scan 3s infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

.controls{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:10px 18px;
border-radius:30px;
border:none;
cursor:pointer;
}

.start{
background:#1a1a1c;
color:white;
}

.stop{
background:#ddd;
}

.result{
margin-top:20px;
font-size:22px;
font-family:'DM Serif Display',serif;
}

.attention img{
margin-top:10px;
width:240px;
border-radius:10px;
}

canvas{
margin-top:30px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">DeepSight</div>
</div>

<div class="video-box">
<video id="video" autoplay muted playsinline></video>
<div id="faceBox"></div>
<div class="scan-line"></div>
</div>

<div class="result" id="result">Press Start</div>

<div class="controls">

<button class="start" onclick="startCamera()">Start</button>
<button class="stop" onclick="stopCamera()">Stop</button>

<input type="file" id="uploadInput">

<button onclick="saveResult()">Save Result</button>

</div>

<div class="attention">
<h3>Artifact Visualization</h3>
<img id="attentionMap">
</div>

<canvas id="probChart"></canvas>

</div>

<script>

let stream=null
let detecting=false

async function startCamera(){

stream=await navigator.mediaDevices.getUserMedia({video:true})

const video=document.getElementById("video")
video.srcObject=stream

detecting=true
detectLoop()

}

function stopCamera(){

detecting=false

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

}

async function detectLoop(){

if(!detecting)return

const video=document.getElementById("video")

const canvas=document.createElement("canvas")
canvas.width=192
canvas.height=192

const ctx=canvas.getContext("2d")
ctx.drawImage(video,0,0,192,192)

const image=canvas.toDataURL("image/jpeg")

const res=await fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({image})
})

const data=await res.json()

applyResult(data)

setTimeout(detectLoop,600)

}
function applyResult(data){

document.getElementById("result").innerText=
data.label+" ("+data.confidence+"%)"

if(data.bbox){

const [x,y,w,h]=data.bbox

const box=document.getElementById("faceBox")

box.style.display="block"
box.style.left=x+"px"
box.style.top=y+"px"
box.style.width=w+"px"
box.style.height=h+"px"

}

if(data.attention){

document.getElementById("attentionMap").src=
"data:image/jpeg;base64,"+data.attention

}

updateGraph(data.score)

}

const ctx=document.getElementById('probChart')

const chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Fake Probability',
data:[],
borderColor:'#1a1a1c',
tension:.4
}]
},
options:{animation:false}
})

function updateGraph(score){

chart.data.datasets[0].data.push(score)

if(chart.data.datasets[0].data.length>30)
chart.data.datasets[0].data.shift()

chart.update()

}

document.getElementById("uploadInput")
.addEventListener("change",async e=>{

let file=e.target.files[0]

let form=new FormData()

form.append("image",file)

let res=await fetch("/upload",{method:"POST",body:form})

let data=await res.json()

alert("Result: "+data.label)

})

function saveResult(){

html2canvas(document.body).then(canvas=>{

let link=document.createElement("a")

link.download="deepsight-result.png"

link.href=canvas.toDataURL()

link.click()

})

}

</script>

</body>
</html>
